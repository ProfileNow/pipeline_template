# This is a Databricks asset bundle definition for sample.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: sample_project
  uuid: 6ffcf262-a6c2-41a3-ae14-2ef085af91cd

include:
  - resources/*.yml
  - resources/*/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405612696547425.5.azuredatabricks.net
      root_path: /Workspace/dev/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: dev_catalog
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://adb-7405612696547425.5.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/jonathan.silva@genesisdigitalsolutions.pt to make sure we only have a single copy.
      root_path: /Workspace/prod/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: prod_catalog
      schema: prod
    permissions:
      - user_name: jonathan.silva@genesisdigitalsolutions.pt
        level: CAN_MANAGE
